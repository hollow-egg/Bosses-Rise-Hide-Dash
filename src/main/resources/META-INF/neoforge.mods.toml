# This is an example mods.toml file. It contains the data relating to the loading mods.
# There are several mandatory fields (#mandatory), and many more that are optional (#optional).
# The overall format is standard TOML format, v0.5.0.
# Note that there are a couple of TOML lists in this file.
# Find more information on toml format here:  https://github.com/toml-lang/toml
# The name of the mod loader type to load - for regular FML @Mod mods it should be javafml
modLoader = "javafml" #mandatory
# A version range to match for said mod loader - for regular FML @Mod it will be the the FML version. This is currently 47.
loaderVersion = "[4,)" #mandatory
# The license for you mod. This is mandatory metadata and allows for easier comprehension of your redistributive properties.
# Review your options at https://choosealicense.com/. All rights reserved is the default copyright stance, and is thus the default here.
license = "MIT"
[[mods]] #mandatory
modId = "bosses_rise_hide_dash" #mandatory
version = "1.0" #mandatory
displayName = "Bosses Rise Hide Dash" #mandatory
authors = "Hollow-Egg" #optional

# The description text for the mod (multi line!) (#mandatory)
description = '''An addon for Bosses' Rise that hides the combat roll icon when not in combat.'''

# The [[mixins]] block allows you to declare your mixin config to FML so that it gets loaded.
[[mixins]]
config = "bosses_rise_hide_dash.mixins.json"

[[dependencies."bosses_rise_hide_dash"]] #optional
# the modid of the dependency
modId = "neoforge" #mandatory
type = "required" #mandatory
versionRange = "[21,)" #mandatory
ordering = "NONE"
side = "BOTH"

[[dependencies."bosses_rise_hide_dash"]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1,1.22)"
ordering = "NONE"
side = "BOTH"

[[dependencies."bosses_rise_hide_dash"]]
modId = "block_factorys_bosses"
type = "required"
versionRange = "[2.1.1,)"
ordering = "NONE"
side = "BOTH"

